<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyApp Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f6fb; color: #222; height: 100vh; overflow: hidden; }
    input:focus { outline: 2px solid #3b4fd4; }
    button:hover { opacity: 0.85; }
    ::-webkit-scrollbar { width: 6px; } 
    ::-webkit-scrollbar-thumb { background: #d0d4e8; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ── Data ──────────────────────────────────────────────────────
    const NAV_ITEMS = [
      { id: "dashboard", label: "Dashboard", icon: "⊞" },
      { id: "analytics", label: "Analytics", icon: "⟁" },
      { id: "users",     label: "Users",     icon: "◎" },
      { id: "settings",  label: "Settings",  icon: "⚙" },
    ];

    const STATS = [
      { label: "Total Users",      value: "12,483", change: "+8.2%",  up: true  },
      { label: "Revenue",          value: "$94,210", change: "+3.1%", up: true  },
      { label: "Bounce Rate",      value: "24.5%",  change: "-1.4%",  up: false },
      { label: "Active Sessions",  value: "1,029",  change: "+12%",   up: true  },
    ];

    const ACTIVITY = [
      { user: "Alice Chen",   action: "Upgraded to Pro",           time: "2 min ago"  },
      { user: "Marcus Reid",  action: "Submitted support ticket",  time: "14 min ago" },
      { user: "Priya Nair",   action: "Completed onboarding",      time: "31 min ago" },
      { user: "Tom Wallis",   action: "Cancelled subscription",    time: "1 hr ago"   },
      { user: "Sara Moon",    action: "Created new project",       time: "2 hr ago"   },
    ];

    // ── Helper: initials from full name ───────────────────────────
    function initials(name) {
      return name.split(" ").map(w => w[0]).join("");
    }

    // ── App ───────────────────────────────────────────────────────
    function App() {
      const [activePage,  setActivePage]  = useState("dashboard");
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [notifOpen,   setNotifOpen]   = useState(false);

      const currentLabel = NAV_ITEMS.find(n => n.id === activePage)?.label;

      return (
        <div style={s.root}>

          {/* ── Sidebar ── */}
          <aside style={{ ...s.sidebar, width: sidebarOpen ? 220 : 60 }}>
            {/* Logo */}
            <div style={{ ...s.logoRow, justifyContent: sidebarOpen ? "flex-start" : "center" }}>
              <div style={s.logoMark}>M</div>
              {sidebarOpen && <span style={s.logoText}>MyApp</span>}
            </div>

            {/* Nav */}
            <nav style={s.nav}>
              {NAV_ITEMS.map(item => {
                const active = activePage === item.id;
                return (
                  <button
                    key={item.id}
                    onClick={() => setActivePage(item.id)}
                    style={{
                      ...s.navBtn,
                      background:   active ? "#e8edfb" : "transparent",
                      color:        active ? "#3b4fd4" : "#555",
                      fontWeight:   active ? 600 : 400,
                      justifyContent: sidebarOpen ? "flex-start" : "center",
                    }}
                  >
                    <span style={s.navIcon}>{item.icon}</span>
                    {sidebarOpen && <span>{item.label}</span>}
                  </button>
                );
              })}
            </nav>

            {/* Collapse toggle */}
            <button onClick={() => setSidebarOpen(!sidebarOpen)} style={s.collapseBtn}>
              {sidebarOpen ? "◂" : "▸"}
            </button>
          </aside>

          {/* ── Main ── */}
          <div style={s.main}>

            {/* Topbar */}
            <header style={s.topbar}>
              <h1 style={s.pageTitle}>{currentLabel}</h1>

              <div style={s.topRight}>
                <input type="text" placeholder="Search…" style={s.search} />

                {/* Notification bell */}
                <div style={{ position: "relative" }}>
                  <button onClick={() => setNotifOpen(!notifOpen)} style={s.iconBtn}>
                    🔔
                    <span style={s.badge}>3</span>
                  </button>
                  {notifOpen && (
                    <div style={s.dropdown}>
                      <p style={s.dropdownHeading}>Notifications</p>
                      {["Server hit 90% CPU", "New sign-up: j.doe@email.com", "Backup completed"].map((msg, i) => (
                        <div key={i} style={s.dropdownItem}>{msg}</div>
                      ))}
                    </div>
                  )}
                </div>

                {/* Avatar */}
                <div style={s.avatar}>JD</div>
              </div>
            </header>

            {/* Content */}
            <main style={s.content}>

              {activePage === "dashboard" ? (
                <>
                  {/* Stat cards */}
                  <div style={s.statsGrid}>
                    {STATS.map(stat => (
                      <div key={stat.label} style={s.statCard}>
                        <p style={s.statLabel}>{stat.label}</p>
                        <p style={s.statValue}>{stat.value}</p>
                        <p style={{ ...s.statChange, color: stat.up ? "#22a05a" : "#d94040" }}>
                          {stat.change} vs last month
                        </p>
                      </div>
                    ))}
                  </div>

                  {/* Activity table */}
                  <div style={s.card}>
                    <h2 style={s.cardTitle}>Recent Activity</h2>
                    <table style={s.table}>
                      <thead>
                        <tr>
                          {["User", "Action", "Time"].map(h => (
                            <th key={h} style={s.th}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {ACTIVITY.map((row, i) => (
                          <tr key={i}>
                            <td style={s.td}>
                              <div style={s.userCell}>
                                <div style={s.miniAvatar}>{initials(row.user)}</div>
                                {row.user}
                              </div>
                            </td>
                            <td style={s.td}>{row.action}</td>
                            <td style={{ ...s.td, color: "#999", fontSize: 13 }}>{row.time}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </>
              ) : (
                <div style={s.placeholder}>
                  <p style={{ fontSize: 48 }}>🚧</p>
                  <p style={{ color: "#888", marginTop: 12 }}>
                    <strong>{currentLabel}</strong> page coming soon.
                  </p>
                </div>
              )}

            </main>
          </div>
        </div>
      );
    }

    // ── Styles ────────────────────────────────────────────────────
    const s = {
      root: {
        display: "flex", height: "100vh",
      },
      // Sidebar
      sidebar: {
        background: "#fff", borderRight: "1px solid #e5e7ef",
        display: "flex", flexDirection: "column",
        padding: "16px 0", transition: "width 0.2s ease",
        overflow: "hidden", flexShrink: 0,
      },
      logoRow: {
        display: "flex", alignItems: "center", gap: 10,
        padding: "0 14px 18px", borderBottom: "1px solid #e5e7ef", marginBottom: 12,
      },
      logoMark: {
        width: 32, height: 32, borderRadius: 8,
        background: "#3b4fd4", color: "#fff",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontWeight: 700, fontSize: 16, flexShrink: 0,
      },
      logoText: { fontWeight: 700, fontSize: 18, whiteSpace: "nowrap" },
      nav: { display: "flex", flexDirection: "column", gap: 4, padding: "0 8px", flex: 1 },
      navBtn: {
        display: "flex", alignItems: "center", gap: 10,
        padding: "10px 12px", borderRadius: 8, border: "none",
        cursor: "pointer", fontSize: 14, width: "100%", whiteSpace: "nowrap",
        transition: "background 0.15s",
      },
      navIcon: { fontSize: 16, flexShrink: 0 },
      collapseBtn: {
        margin: "12px 8px 0", padding: 8, background: "transparent",
        border: "1px solid #e5e7ef", borderRadius: 8,
        cursor: "pointer", fontSize: 14, color: "#888",
      },
      // Topbar
      topbar: {
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "0 28px", height: 64,
        background: "#fff", borderBottom: "1px solid #e5e7ef", flexShrink: 0,
      },
      pageTitle: { fontSize: 20, fontWeight: 600 },
      topRight: { display: "flex", alignItems: "center", gap: 14 },
      search: {
        border: "1px solid #e0e2ec", borderRadius: 8,
        padding: "7px 14px", fontSize: 14,
        background: "#f7f8fc", width: 200,
      },
      iconBtn: {
        background: "transparent", border: "none",
        cursor: "pointer", fontSize: 18,
        position: "relative", padding: 4,
      },
      badge: {
        position: "absolute", top: -2, right: -2,
        background: "#d94040", color: "#fff",
        borderRadius: "50%", fontSize: 10,
        width: 16, height: 16,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontWeight: 700,
      },
      dropdown: {
        position: "absolute", right: 0, top: 36,
        background: "#fff", border: "1px solid #e5e7ef",
        borderRadius: 10, padding: 12, width: 260,
        zIndex: 100, boxShadow: "0 4px 16px rgba(0,0,0,0.08)",
      },
      dropdownHeading: { fontWeight: 600, fontSize: 13, marginBottom: 8, color: "#888" },
      dropdownItem: {
        padding: "8px 0", borderTop: "1px solid #f0f0f0",
        fontSize: 13, color: "#333",
      },
      avatar: {
        width: 36, height: 36, borderRadius: "50%",
        background: "#3b4fd4", color: "#fff",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontWeight: 600, fontSize: 13, cursor: "pointer", flexShrink: 0,
      },
      // Content
      main: { flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" },
      content: {
        flex: 1, padding: 28, overflowY: "auto",
        display: "flex", flexDirection: "column", gap: 24,
      },
      // Stats
      statsGrid: {
        display: "grid",
        gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))",
        gap: 16,
      },
      statCard: {
        background: "#fff", borderRadius: 12,
        border: "1px solid #e5e7ef", padding: "18px 20px",
      },
      statLabel:  { fontSize: 13, color: "#888", marginBottom: 6 },
      statValue:  { fontSize: 26, fontWeight: 700, marginBottom: 4 },
      statChange: { fontSize: 12 },
      // Card / table
      card: {
        background: "#fff", borderRadius: 12,
        border: "1px solid #e5e7ef", padding: "20px 24px",
      },
      cardTitle: { fontSize: 16, fontWeight: 600, marginBottom: 16 },
      table:     { width: "100%", borderCollapse: "collapse" },
      th: {
        textAlign: "left", fontSize: 12, color: "#888",
        fontWeight: 500, padding: "0 12px 10px",
        borderBottom: "1px solid #f0f0f0",
        textTransform: "uppercase", letterSpacing: "0.05em",
      },
      td: {
        padding: "12px", fontSize: 14,
        verticalAlign: "middle", borderBottom: "1px solid #f7f7f7",
      },
      userCell:  { display: "flex", alignItems: "center", gap: 10 },
      miniAvatar: {
        width: 28, height: 28, borderRadius: "50%",
        background: "#eceffe", color: "#3b4fd4",
        fontSize: 11, fontWeight: 700,
        display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0,
      },
      // Placeholder
      placeholder: {
        flex: 1, display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        padding: 60, background: "#fff",
        borderRadius: 12, border: "1px solid #e5e7ef",
      },
    };

    // ── Mount ─────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
